[phases.setup]
nixPkgs = [
"python311",
"python311Packages.pip",
"chromium"
]

[phases.install]
cmds = [
"python3 -m pip install --upgrade pip",
"python3 -m pip install -r requirements.txt"
]

[phases.build]
cmds = [
"python3 -m playwright install chromium --with-deps"
]

[start]
cmd = "python3 main.py"
